name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FAIL=0

          # Check for real Discord webhook URLs (token part after the ID)
          if grep -rn "discord\.com/api/webhooks/[0-9]\{10,\}/" --include="*.py" --include="*.js" --include="*.txt" . 2>/dev/null | grep -v "your_webhook_here\|example\|placeholder"; then
            echo "ERROR: Hardcoded Discord webhook URL found!"
            FAIL=1
          fi

          # Check for Alpaca key pattern (starts with PK or SK followed by alphanum)
          if grep -rn "\"PK[A-Z0-9]\{20,\}\"\|'PK[A-Z0-9]\{20,\}'" --include="*.py" . 2>/dev/null; then
            echo "ERROR: Hardcoded Alpaca API key found!"
            FAIL=1
          fi

          if [ $FAIL -eq 1 ]; then
            echo ""
            echo "PUSH BLOCKED: Remove hardcoded secrets before pushing."
            echo "Use environment variables / GitHub Secrets instead."
            exit 1
          fi

          echo "No hardcoded secrets found. All clear."
